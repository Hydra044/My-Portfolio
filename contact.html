<style>
/* =================== CONTACT STYLING =================== */
.contact-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
    min-height: 70vh;
    gap: 30px;
    text-align: center;
}

.contact-section h2 {
    font-size: 36px;
    margin-bottom: 20px;
    color: #38bdf8;
}

.contact-cards {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
    justify-content: center;
}

.contact-card {
    background: rgba(255,255,255,0.05);
    padding: 25px 40px;
    border-radius: 15px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    transition: 0.3s;
    min-width: 250px;
    text-align: center;
}

.contact-card:hover {
    transform: translateY(-10px) scale(1.05);
    background: rgba(56, 189, 248, 0.1);
}

.contact-card i {
    font-size: 28px;
    margin-bottom: 10px;
    color: #38bdf8;
}

.contact-card p, .contact-card a, .contact-card span {
    font-size: 18px;
    color: white;
    text-decoration: none;
}

.contact-card a:hover {
    color: #0ea5e9;
}

.btn-map {
    margin-top: 20px;
    background: #38bdf8;
    color: black;
    padding: 12px 25px;
    border-radius: 5px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn-map:hover {
    background: #0ea5e9;
    transform: scale(1.05);
}

/* Responsive */
@media (max-width: 768px) {
    .contact-cards {
        flex-direction: column;
        gap: 20px;
    }
}
</style>
</head>

<!-- Scripts -->
<script>
document.addEventListener('DOMContentLoaded', () => {
    const body = document.body;

    // Apply saved dark mode preference
    if (localStorage.getItem('darkMode') === 'enabled') {
        body.classList.add('dark-mode');
    }

    // Dark mode toggle
    const toggle = document.getElementById('darkToggle');
    if (toggle) {
        toggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', body.classList.contains('dark-mode') ? 'enabled' : 'disabled');
        });
    }
});
</script>
